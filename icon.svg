<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#000000"/>
  <!-- telescope -->
  <g stroke="#d40000" stroke-width="20" stroke-linecap="round" fill="none">
    <rect x="150" y="150" width="230" height="70" rx="12" transform="rotate(35 256 256)" fill="#3a0000"/>
    <line x1="300" y1="330" x2="300" y2="430"/>
    <line x1="240" y1="430" x2="360" y2="430"/>
  </g>
  <!-- stars -->
  <g fill="#ff3b30">
    <circle cx="120" cy="110" r="14"/>
    <circle cx="400" cy="130" r="10"/>
    <circle cx="360" cy="70" r="7"/>
    <circle cx="180" cy="60" r="7"/>
  </g>
</svg>
